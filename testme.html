<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Me</title>
<style>
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at top, rgba(83, 194, 244, 0.18), transparent 38%),
    linear-gradient(180deg, #0f1c2c 0%, #08111d 100%);
  color: #eef8ff;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

.card {
  width: min(420px, calc(100vw - 32px));
  padding: 32px 28px;
  border: 1px solid rgba(116, 196, 255, 0.2);
  border-radius: 24px;
  background: rgba(6, 14, 25, 0.84);
  box-shadow:
    0 18px 40px rgba(0, 0, 0, 0.35),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
  text-align: center;
}

h1 {
  margin: 0 0 12px;
  font-size: clamp(1.8rem, 4vw, 2.4rem);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

p {
  margin: 0 0 24px;
  color: rgba(238, 248, 255, 0.8);
  line-height: 1.5;
}

button {
  border: 0;
  border-radius: 999px;
  padding: 14px 28px;
  font: inherit;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: #082032;
  background: linear-gradient(180deg, #94efff 0%, #44c7ff 100%);
  box-shadow:
    0 10px 24px rgba(68, 199, 255, 0.3),
    inset 0 1px 0 rgba(255, 255, 255, 0.55);
  cursor: pointer;
}

button:hover {
  transform: translateY(-1px);
}

button:active {
  transform: translateY(1px);
}
</style>
</head>
<body>
<main class="card">
  <h1>Test Me</h1>
  <p>Open the live Warzone 2100 Radio page.</p>
  <button id="goButton" type="button">Open Radio</button>
</main>

<script>
const destination = "https://maway2000.github.io/warzone2100-radio/";

document.getElementById("goButton").addEventListener("click", () => {
  window.location.href = destination;
});
</script>
</body>
</html>

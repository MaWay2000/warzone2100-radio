<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Warzone Radio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
window.ASSET_VERSION = "20260317-refactor2";
window.versionedAsset = function(path) {
  return path + "?v=" + window.ASSET_VERSION;
};

const stylesheet = document.createElement("link");
stylesheet.rel = "stylesheet";
stylesheet.href = window.versionedAsset("styles.css");
document.head.appendChild(stylesheet);
</script>
</head>
<body>

<div id="playerWrap"><div id="player"></div></div>

<div class="wrap drag-hint" id="radioWrap">
 <img data-asset-path="assets/warzone-radio-logo.webp" class="logo" alt="Warzone 2100 Radio logo">
 <div class="player">
  <div class="btn" onclick="nextTrack()" title="Next">
   <svg viewBox="0 0 24 24"><polygon points="5,4 15,12 5,20"/><rect x="16" y="4" width="3" height="16"/></svg>
  </div>

  <div class="btn" onclick="playPause()" id="pp" title="Play/Pause">
   <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
  </div>

  <div class="tube">
   <div class="eqGlow" id="eqGlow"></div>
   <div class="eq" id="eq"></div>
   <div class="cover" id="cover"></div>
   <input id="vol" type="range" min="0" max="100" value="30" oninput="setVol(this.value)">
  </div>

  <div class="btn" onclick="prevTrack()" title="Previous">
   <svg viewBox="0 0 24 24"><polygon points="19,4 9,12 19,20"/><rect x="5" y="4" width="3" height="16"/></svg>
  </div>
 </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const playerScript = document.createElement("script");
playerScript.src = window.versionedAsset("player.js");
document.body.appendChild(playerScript);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OPUS to MP3 Converter</title>
  <meta
    name="description"
    content="Convert OPUS to MP3 directly in your browser."
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="card">
    <h1>OPUS to MP3 Converter</h1>
    <p class="intro">
      Local static version. Conversion stays in your browser and does not upload
      your audio anywhere.
    </p>

    <section id="dropzone" class="dropzone" aria-label="File upload area">
      <strong>Drop your .opus file here</strong>
      <p class="small">You can also use compatible `.ogg` and `.webm` audio files.</p>

      <div class="row">
        <label class="btn" for="fileInput">Choose File</label>
        <button id="convertBtn" class="btn secondary" type="button" disabled>
          Convert to MP3
        </button>
      </div>

      <input
        id="fileInput"
        type="file"
        accept=".opus,audio/opus,.ogg,.webm,audio/ogg,audio/webm"
      >
    </section>

    <section id="fileBox" class="panel" hidden></section>

    <section id="status" class="panel warn" aria-live="polite">
      <strong>Status</strong>
      <div id="statusText" class="small status-text">Waiting for file.</div>
      <progress id="progress" value="0" max="100" hidden></progress>
    </section>

    <section id="result" class="panel ok" hidden>
      <strong>Finished</strong>
      <div id="resultText" class="small status-text"></div>
      <div class="row">
        <a id="downloadBtn" class="btn" href="#" download="converted.mp3">
          Download MP3
        </a>
      </div>
      <audio id="audioPreview" controls></audio>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
